<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    justify-content: center;
    padding: 1rem;
  }
  .container { width: 100%; max-width: 360px; }
  .header {
    text-align: center;
    margin-bottom: 1rem;
    font-size: 13px;
    color: #888;
    letter-spacing: 0.5px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 2rem 1.5rem;
    text-align: center;
    margin-bottom: 1rem;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 12px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .chinese {
    font-size: 64px;
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.1;
  }
  .pinyin {
    font-size: 20px;
    color: #378ADD;
    font-weight: 400;
    letter-spacing: 1px;
  }
  .meaning {
    font-size: 17px;
    color: #666;
  }
  .timer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    padding: 0 4px;
  }
  .timer-label { font-size: 12px; color: #aaa; white-space: nowrap; }
  .bar-bg {
    flex: 1;
    height: 4px;
    background: #e8e8e4;
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: #378ADD;
    border-radius: 2px;
    transition: width 0.9s linear;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .control-box {
    background: #fff;
    border-radius: 14px;
    padding: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  }
  .control-box label {
    display: block;
    font-size: 11px;
    color: #aaa;
    margin-bottom: 6px;
    font-weight: 500;
  }
  select {
    width: 100%;
    font-size: 13px;
    border: none;
    background: #f5f5f0;
    border-radius: 8px;
    padding: 6px 8px;
    color: #333;
    -webkit-appearance: none;
    cursor: pointer;
  }
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  button {
    padding: 12px;
    border-radius: 14px;
    border: none;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.97); opacity: 0.85; }
  .btn-prev { background: #fff; color: #333; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .btn-next { background: #378ADD; color: #fff; }
  .counter {
    text-align: center;
    font-size: 12px;
    color: #bbb;
    margin-top: 10px;
  }
</style>
</head>

  <div class="counter" id="counter"></div>
</div>

const levelColors = {
  1: {bg:'#E6F1FB', color:'#185FA5'},
  2: {bg:'#E1F5EE', color:'#0F6E56'},
  3: {bg:'#FAECE7', color:'#993C1D'},
  4: {bg:'#FBEAF0', color:'#993556'},
  5: {bg:'#EAF3DE', color:'#3B6D11'},
  6: {bg:'#EEEDFE', color:'#3C3489'}
};

let currentLevel = 1, pool = [], idx = 0, totalSec = 10, secLeft = 10, timer = null;

function shuffle(a) {
  const b = [...a]; for (let i = b.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b;
}
function buildPool(lvl) {
  if (lvl === 0) { let all=[]; for(let l=1;l<=6;l++) all=all.concat(vocab[l].map(w=>({...w,level:l}))); return shuffle(all); }
  return shuffle(vocab[lvl].map(w=>({...w,level:lvl})));
}
function showWord() {
  const w = pool[idx];
  document.getElementById('char').textContent = w.c;
  document.getElementById('pinyin').textContent = w.p;
  document.getElementById('meaning').textContent = w.m;
  const badge = document.getElementById('badge');
  badge.textContent = 'HSK ' + w.level;
  const col = levelColors[w.level];
  badge.style.background = col.bg; badge.style.color = col.color;
  document.getElementById('counter').textContent = (idx+1) + ' / ' + pool.length + ' คำ';
}
function updateBar() {
  const pct = Math.round((secLeft/totalSec)*100);
  document.getElementById('bar').style.width = pct + '%';
  const s = secLeft;
  document.getElementById('countdown').textContent = s<60?s+'s':s<3600?Math.round(s/60)+'m':s<86400?Math.round(s/3600)+'h':Math.round(s/86400)+'d';
}
function startTimer() {
  clearInterval(timer); secLeft = totalSec; updateBar();
  timer = setInterval(()=>{ secLeft=Math.max(0,secLeft-1); updateBar(); if(secLeft<=0){idx=(idx+1)%pool.length;showWord();secLeft=totalSec;} },1000);
}
function nextWord() { idx=(idx+1)%pool.length; showWord(); startTimer(); }
function prevWord() { idx=(idx-1+pool.length)%pool.length; showWord(); startTimer(); }

document.getElementById('lvl-select').addEventListener('change',function(){ currentLevel=parseInt(this.value); pool=buildPool(currentLevel); idx=0; showWord(); startTimer(); });
document.getElementById('freq-select').addEventListener('change',function(){ totalSec=parseInt(this.value); secLeft=totalSec; startTimer(); });

pool = buildPool(1); showWord(); startTimer();
